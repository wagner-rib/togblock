<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 36">
  <!-- Left stud shadow -->
  <circle cx="16" cy="10" r="7.5" fill="#1D4ED8" opacity=".7"/>
  <!-- Left stud face -->
  <circle cx="16" cy="7.5" r="7.5" fill="#2563EB"/>
  <!-- Left stud highlight -->
  <circle cx="13.2" cy="5" r="3" fill="white" opacity=".45"/>
  <!-- Right stud shadow -->
  <circle cx="40" cy="10" r="7.5" fill="#1D4ED8" opacity=".7"/>
  <!-- Right stud face -->
  <circle cx="40" cy="7.5" r="7.5" fill="#2563EB"/>
  <!-- Right stud highlight -->
  <circle cx="37.2" cy="5" r="3" fill="white" opacity=".45"/>
  <!-- Brick body -->
  <rect x="1" y="14" width="54" height="20" rx="6" fill="#2563EB"/>
  <!-- Top bevel -->
  <rect x="1" y="14" width="54" height="8" rx="6" fill="white" opacity=".14"/>
  <!-- Bottom depth -->
  <rect x="3" y="30" width="50" height="4" rx="3" fill="black" opacity=".22"/>
</svg>
